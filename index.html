<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>婚配方位 | 农历月日·寻缘方向</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #fef7e8;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 520px;
            width: 100%;
            background: #fffef7;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #ffe3b5;
        }
        .header {
            background: #fff0dc;
            padding: 28px 24px 20px 24px;
            text-align: center;
            border-bottom: 1px solid #ffdcb0;
        }
        .header h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 600;
            color: #b45f2b;
            letter-spacing: 1px;
        }
        .header p {
            margin: 10px 0 0;
            color: #9b6a3e;
            font-size: 0.9rem;
            background: #fff4e8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .content {
            padding: 28px 24px 32px;
        }
        .input-group {
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #7c4a2a;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .input-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .input-row .field {
            flex: 1;
            min-width: 120px;
        }
        select {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1.5px solid #f0dbb8;
            border-radius: 28px;
            background: white;
            transition: 0.2s;
            font-family: inherit;
            color: #3c2a1f;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #e2a46b;
            box-shadow: 0 0 0 3px rgba(226,164,107,0.2);
        }
        .hint {
            font-size: 0.75rem;
            color: #b88452;
            margin-top: 6px;
            margin-left: 12px;
        }
        button {
            background: #d9914a;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
            box-shadow: 0 5px 0 #8b4e21;
            font-family: inherit;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b4e21;
        }
        .result {
            margin-top: 32px;
            background: #fff8f0;
            border-radius: 32px;
            padding: 20px;
            border-left: 8px solid #f0bc7a;
        }
        .result h3 {
            margin: 0 0 12px 0;
            font-size: 1.3rem;
            color: #9b5e2c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .direction-badge {
            background: #e7cfb1;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 8px 8px 0 0;
            color: #5e3619;
        }
        .tag {
            background: #f2e3d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 12px;
            color: #7c552f;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #ba916b;
            margin-top: 24px;
            border-top: 1px solid #f4e2cd;
            padding-top: 18px;
        }
        @media (max-width: 500px) {
            .card { border-radius: 32px 24px 32px 24px; }
            .content { padding: 20px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🌸 婚配方位·月日法</h1>
        <p>农历生辰·寻缘方向</p>
    </div>
    <div class="content">
        <div class="input-group">
            <label>📅 您的农历出生月、日</label>
            <div class="input-row">
                <div class="field">
                    <select id="lunarMonth">
                        <option value="">选择月份</option>
                        <option value="1">正月 (寅)</option>
                        <option value="2">二月 (卯)</option>
                        <option value="3">三月 (辰)</option>
                        <option value="4">四月 (巳)</option>
                        <option value="5">五月 (午)</option>
                        <option value="6">六月 (未)</option>
                        <option value="7">七月 (申)</option>
                        <option value="8">八月 (酉)</option>
                        <option value="9">九月 (戌)</option>
                        <option value="10">十月 (亥)</option>
                        <option value="11">十一月 (子)</option>
                        <option value="12">十二月 (丑)</option>
                    </select>
                </div>
                <div class="field">
                    <select id="lunarDay">
                        <option value="">选择日期</option>
                        <!-- 动态生成1-30 -->
                    </select>
                    <div class="hint">农历初一 ~ 三十</div>
                </div>
            </div>
        </div>

        <button id="calcBtn">✨ 推算适宜方位 ✨</button>

        <div id="resultArea" class="result" style="display: none;">
            <h3>🧧 占卜结果</h3>
            <div id="methodResult"></div>
            <div class="tag">📜 传统月日数法·嫁娶择方 仅供文化娱乐参考</div>
        </div>
        <div class="footer-note">
            🌙 从出生月地支顺数至生日，落点方位及其相反方向为良缘方位<br>
            请以真挚感情为重，灵犀胜于方位。
        </div>
    </div>
</div>

<script>
    // 十二地支列表及方位映射
    const dizhiList = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const directionMap = {
        '子':'正北', '丑':'东北', '寅':'东北', '卯':'正东', '辰':'东南', '巳':'东南',
        '午':'正南', '未':'西南', '申':'西南', '酉':'正西', '戌':'西北', '亥':'西北'
    };
    // 农历月份转地支
    const monthToDizhi = {
        1:'寅',2:'卯',3:'辰',4:'巳',5:'午',6:'未',
        7:'申',8:'酉',9:'戌',10:'亥',11:'子',12:'丑'
    };

    // 获取相反地支（加6模12）
    function getOppositeDizhi(dz) {
        let idx = dizhiList.indexOf(dz);
        if(idx === -1) return null;
        let oppIdx = (idx + 6) % 12;
        return dizhiList[oppIdx];
    }

    // 月日数法核心：输入农历月(1-12)，农历日(1-30)，返回 [方位1, 方位2]
    function getDirectionByMonthDay(lunarMonth, lunarDay) {
        if(!lunarMonth || !lunarDay) return null;
        let startDizhi = monthToDizhi[lunarMonth];
        if(!startDizhi) return null;
        let startIdx = dizhiList.indexOf(startDizhi);
        // 从月地支开始，顺数到生日（包含当天，生日数字为步数，第1步落在月地支）
        let targetIdx = (startIdx + (lunarDay - 1)) % 12;
        let targetDizhi = dizhiList[targetIdx];
        let dir1 = directionMap[targetDizhi];
        let oppDizhi = getOppositeDizhi(targetDizhi);
        let dir2 = directionMap[oppDizhi];
        return [dir1, dir2];
    }

    // 渲染结果
    function calculateAndRender() {
        const monthVal = document.getElementById('lunarMonth').value;
        const dayVal = document.getElementById('lunarDay').value;

        if(!monthVal || !dayVal) {
            alert('请完整选择农历月份和日期 🌙');
            return;
        }
        const lunarMonth = parseInt(monthVal, 10);
        const lunarDay = parseInt(dayVal, 10);
        if(lunarDay < 1 || lunarDay > 30) {
            alert('农历日期请选择1~30之间的有效值');
            return;
        }

        const dirs = getDirectionByMonthDay(lunarMonth, lunarDay);
        let resultHtml = '';
        if(dirs) {
            resultHtml = `
                <strong>📌 月日数法 · 良缘方位</strong><br>
                您出生于农历${lunarMonth}月（${monthToDizhi[lunarMonth]}月），
                从该地支起顺数至农历${lunarDay}日，落点为“<strong>${dirs[0]}</strong>”。<br><br>
                🧭 适宜寻找出生在您 <span class="direction-badge">${dirs[0]}</span> 
                或 <span class="direction-badge">${dirs[1]}</span> 方向的伴侣。<br>
                <span style="font-size:0.8rem; color:#a5673a;">（以您的出生地为参照点）</span>
            `;
        } else {
            resultHtml = `<strong>📌 月日数法</strong><br>信息有误，请确保月份和日期正确。`;
        }

        const resultDiv = document.getElementById('resultArea');
        document.getElementById('methodResult').innerHTML = resultHtml;
        resultDiv.style.display = 'block';
        // 平滑滚动到结果区
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 动态生成日期下拉选项（1-30）
    function initDropdowns() {
        const daySelect = document.getElementById('lunarDay');
        for(let d = 1; d <= 30; d++) {
            let option = document.createElement('option');
            option.value = d;
            option.textContent = `${d}日`;
            daySelect.appendChild(option);
        }
        // 月份默认空，让用户手动选择
        document.getElementById('lunarMonth').value = "";
    }

    // 绑定事件
    document.getElementById('calcBtn').addEventListener('click', calculateAndRender);
    window.addEventListener('DOMContentLoaded', initDropdowns);
</script>
</body>
</html>
